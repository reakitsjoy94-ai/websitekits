<body>

<h1>MY PORTFOLIO</h1>

<nav class="navbar">
    <ul>
        <a href="home.html">HOME</a>
        <a href="project.html">MY PROJECT</a>
        <a href="about.html">ABOUT ME</a>
        <a href="contact.html">CONTACT</a>
    </ul>
</nav>


<div class="hero-section">
    <div class="hero-container">
        <div class="image-side">
            <img src="kits.jpg" alt="Kits Joy Mique Rea" class="profile-image">
        </div>
        <div class="name-side">
            <h1 class="hero-name">Kits Joy Mique Rea</h1>
            <p class="hero-location">Bachelor of Science Computer Science</p>
        </div>
    </div>
</div>

<style>
h1 {
    text-align: center;
    font-size: 24px;
    color: #060606;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0; 
    background-color: #f4f4f4;
}

.navbar {
    background-color: #ff00bbf0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    padding: 30px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
}

.navbar a {
    color: rgb(12, 11, 11);
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    transition: background 0.3s ease, color 0.3s ease;
    border-radius: 5px;
    margin: 0 10px;
}

.navbar a:hover {
    background-color: #0b0b0b;
    color: #fff;
}

.content {
    padding: 20px;
    text-align: center;
    font-size: 20px;
    color: #010101;
}

ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

/* New styles for hero section with image left and name right */
.hero-section {
    padding: 50px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 400px;
}

.hero-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    max-width: 900px;
    width: 100%;
    background-color: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.1);
}

.image-side {
    flex: 1;
    text-align: right;
}

.profile-image {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff00bbf0;
    box-shadow: 0px 4px 15px rgba(255, 0, 187, 0.3);
    transition: transform 0.3s ease;
}

.profile-image:hover {
    transform: scale(1.05);
}

.name-side {
    flex: 1;
    text-align: left;
    padding-left: 20px;
}

.hero-name {
    font-size: 42px;
    color: #ff00bbf0;
    margin: 0 0 10px 0;
    text-align: left;
    font-weight: bold;
    line-height: 1.2;
}

.hero-location {
    font-size: 24px;
    color: #666;
    margin: 0;
    font-style: italic;
}

/* Responsive design for mobile */
@media (max-width: 768px) {
    .hero-container {
        flex-direction: column;
        text-align: center;
        gap: 30px;
        padding: 30px;
    }
    
    .image-side {
        text-align: center;
    }
    
    .name-side {
        text-align: center;
        padding-left: 0;
    }
    
    .hero-name {
        text-align: center;
        font-size: 32px;
    }
    
    .profile-image {
        width: 250px;
        height: 250px;
    }
}
</style>
</body>
</html>
